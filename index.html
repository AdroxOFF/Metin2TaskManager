<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Task Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* =============================================
       CSS CUSTOM PROPERTIES (DESIGN TOKENS)
       ============================================= */
    :root {
      --bg-base:        #0d0d12;
      --bg-card:        #13131c;
      --bg-card-hover:  #17172280;
      --bg-input:       #0a0a10;
      --bg-header:      #0f0f18;

      --border-dim:     #1e1e2e;
      --border-accent:  #5b21b6;
      --border-gold:    #b8860b;

      --purple-bright:  #a855f7;
      --purple-mid:     #7c3aed;
      --purple-dim:     #3b1f6e;
      --gold-bright:    #f5c842;
      --gold-mid:       #d4a017;
      --gold-dim:       #3a2a04;

      --text-primary:   #e8e8f0;
      --text-secondary: #8888aa;
      --text-dim:       #44445a;
      --text-gold:      #f5c842;
      --text-purple:    #c084fc;

      --green-bright:   #22c55e;
      --green-dim:      #052e16;
      --red-bright:     #f87171;
      --red-dim:        #3b0f0f;

      --radius-sm:      6px;
      --radius-md:      10px;
      --radius-lg:      16px;

      --shadow-purple:  0 0 20px #7c3aed33;
      --shadow-gold:    0 0 20px #d4a01733;
      --shadow-card:    0 4px 24px #00000060;

      --font-display:   'Rajdhani', sans-serif;
      --font-mono:      'Share Tech Mono', monospace;
      --font-body:      'Exo 2', sans-serif;

      --transition:     all 0.18s ease;
    }

    /* =============================================
       RESET & BASE
       ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg-base);
      background-image:
        radial-gradient(ellipse 80% 40% at 50% -10%, #1a0a3355 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 39px, #1a1a2208 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, #1a1a2208 40px);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* =============================================
       HEADER
       ============================================= */
    header {
      background: linear-gradient(180deg, #0c0c18 0%, var(--bg-header) 100%);
      border-bottom: 1px solid var(--border-accent);
      box-shadow: 0 2px 32px #7c3aed22, 0 0 0 1px #5b21b610;
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1600px;
      margin: 0 auto;
      height: 68px;
      gap: 24px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--purple-mid), var(--gold-mid));
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: var(--shadow-purple);
    }

    .logo-text {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--purple-bright), var(--gold-bright));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* =============================================
       BUTTONS
       ============================================= */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
      user-select: none;
    }

    .btn:active { transform: scale(0.97); }

    .btn-purple {
      background: linear-gradient(135deg, var(--purple-mid), #4c1d95);
      border-color: var(--purple-bright);
      color: #fff;
      box-shadow: 0 0 12px #7c3aed44;
    }
    .btn-purple:hover {
      background: linear-gradient(135deg, var(--purple-bright), var(--purple-mid));
      box-shadow: var(--shadow-purple);
    }

    .btn-gold {
      background: linear-gradient(135deg, var(--gold-mid), #78350f);
      border-color: var(--gold-bright);
      color: var(--gold-bright);
      box-shadow: 0 0 12px #d4a01733;
    }
    .btn-gold:hover {
      background: linear-gradient(135deg, var(--gold-bright), var(--gold-mid));
      color: #0d0d12;
      box-shadow: var(--shadow-gold);
    }

    .btn-danger {
      background: var(--red-dim);
      border-color: var(--red-bright);
      color: var(--red-bright);
      padding: 5px 10px;
      font-size: 12px;
    }
    .btn-danger:hover {
      background: #7f1d1d;
      box-shadow: 0 0 10px #f8717133;
    }

    .btn-ghost {
      background: transparent;
      border-color: var(--border-dim);
      color: var(--text-secondary);
      padding: 5px 12px;
      font-size: 12px;
    }
    .btn-ghost:hover {
      border-color: var(--purple-bright);
      color: var(--text-purple);
    }

    .btn-sm {
      padding: 5px 12px;
      font-size: 12px;
    }

    /* =============================================
       INPUTS
       ============================================= */
    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    input[type="text"] {
      background: var(--bg-input);
      border: 1px solid var(--border-dim);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 14px;
      padding: 8px 14px;
      outline: none;
      transition: var(--transition);
      min-width: 0;
    }
    input[type="text"]::placeholder { color: var(--text-dim); }
    input[type="text"]:focus {
      border-color: var(--purple-bright);
      box-shadow: 0 0 0 2px #a855f722;
    }

    /* =============================================
       MAIN LAYOUT
       ============================================= */
    main {
      max-width: 1600px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    /* =============================================
       TOP ACTION BAR
       ============================================= */
    .action-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 32px;
      padding: 16px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-card);
    }

    .action-bar-title {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .action-bar-sep {
      width: 1px;
      height: 28px;
      background: var(--border-dim);
    }

    .reset-section {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* =============================================
       STATUS CHIPS
       ============================================= */
    .status-info {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-left: auto;
      flex-wrap: wrap;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-family: var(--font-mono);
      font-size: 11px;
      border: 1px solid;
    }
    .chip-purple { background: var(--purple-dim); border-color: var(--purple-mid); color: var(--text-purple); }
    .chip-gold   { background: var(--gold-dim);   border-color: var(--gold-mid);   color: var(--gold-bright); }
    .chip-green  { background: var(--green-dim);  border-color: var(--green-bright); color: var(--green-bright); }

    .chip-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* =============================================
       ACCOUNTS GRID
       ============================================= */
    #accounts-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 20px;
    }

    /* =============================================
       ACCOUNT CARD
       ============================================= */
    .account-card {
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      animation: cardIn 0.25s ease both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .account-card:hover {
      border-color: var(--purple-dim);
      box-shadow: var(--shadow-card), 0 0 0 1px #5b21b620;
    }

    .account-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 12px;
      background: linear-gradient(90deg, #17172888, #12121c);
      border-bottom: 1px solid var(--border-dim);
      gap: 10px;
    }

    .account-name-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .account-badge {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--purple-dim), #0d0d12);
      border: 1px solid var(--purple-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-purple);
      flex-shrink: 0;
    }

    .account-name {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .account-name-input {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      background: #0a0a1888;
      border: 1px solid var(--purple-bright);
      border-radius: 4px;
      color: var(--text-primary);
      padding: 2px 8px;
      outline: none;
      width: 160px;
    }

    .account-actions { display: flex; gap: 6px; }

    /* =============================================
       CHARACTER TABLE
       ============================================= */
    .char-table-wrap {
      padding: 14px 18px;
    }

    table.char-table {
      width: 100%;
      border-collapse: collapse;
    }

    .char-table thead tr {
      border-bottom: 1px solid var(--border-dim);
    }

    .char-table th {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-secondary);
      padding: 4px 8px 8px;
      text-align: left;
    }

    .char-table th.task-col {
      text-align: center;
      min-width: 100px;
    }

    .char-table th .col-label-daily  { color: var(--text-purple); }
    .char-table th .col-label-weekly { color: var(--gold-bright); }

    .char-table tbody tr {
      border-bottom: 1px solid #1a1a2a;
      transition: background 0.15s ease;
    }
    .char-table tbody tr:last-child { border-bottom: none; }
    .char-table tbody tr:hover { background: var(--bg-card-hover); }

    .char-table td {
      padding: 7px 8px;
      vertical-align: middle;
    }

    .char-name-cell {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .char-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--purple-mid);
      flex-shrink: 0;
    }

    .char-name {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .char-table td.task-col { text-align: center; }

    /* =============================================
       CUSTOM CHECKBOXES
       ============================================= */
    .cb-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .cb-wrap input[type="checkbox"] { display: none; }

    .cb-box {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      border: 1.5px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      position: relative;
      flex-shrink: 0;
    }

    /* Daily checkbox — purple theme */
    .cb-daily .cb-box {
      border-color: var(--purple-mid);
      background: #1a0a3322;
    }
    .cb-daily input:checked ~ .cb-box {
      border-color: var(--purple-bright);
      background: var(--purple-dim);
      box-shadow: 0 0 8px #a855f766;
    }
    .cb-daily .cb-box::after {
      content: '';
      display: none;
      width: 5px;
      height: 10px;
      border: 2px solid var(--purple-bright);
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }
    .cb-daily input:checked ~ .cb-box::after { display: block; }

    /* Weekly checkbox — gold theme */
    .cb-weekly .cb-box {
      border-color: var(--gold-mid);
      background: #3a2a0422;
    }
    .cb-weekly input:checked ~ .cb-box {
      border-color: var(--gold-bright);
      background: var(--gold-dim);
      box-shadow: 0 0 8px #f5c84266;
    }
    .cb-weekly .cb-box::after {
      content: '';
      display: none;
      width: 5px;
      height: 10px;
      border: 2px solid var(--gold-bright);
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }
    .cb-weekly input:checked ~ .cb-box::after { display: block; }

    /* =============================================
       ADD CHARACTER ROW
       ============================================= */
    .add-char-row {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px 18px 14px;
      border-top: 1px solid var(--border-dim);
    }

    .add-char-row input[type="text"] {
      flex: 1;
      font-size: 13px;
      padding: 6px 12px;
    }

    /* =============================================
       EMPTY STATE
       ============================================= */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dim);
    }
    .empty-state-icon { font-size: 36px; margin-bottom: 12px; }
    .empty-state-text {
      font-family: var(--font-display);
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* =============================================
       CONFIRMATION MODAL
       ============================================= */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: #00000088;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      animation: fadeIn 0.15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border-accent);
      border-radius: var(--radius-lg);
      padding: 28px 32px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 8px 48px #00000090, var(--shadow-purple);
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(-10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 10px;
      color: var(--text-primary);
    }

    .modal-body {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

    /* =============================================
       TOAST NOTIFICATION
       ============================================= */
    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--bg-card);
      border: 1px solid var(--purple-bright);
      border-radius: var(--radius-md);
      padding: 12px 20px;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--text-purple);
      box-shadow: var(--shadow-purple);
      z-index: 9999;
      display: none;
      animation: toastIn 0.2s ease;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* =============================================
       LAST RESET INFO
       ============================================= */
    .reset-timestamps {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* =============================================
       SCROLLBAR
       ============================================= */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: var(--purple-dim); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--purple-mid); }

    /* =============================================
       RESPONSIVE
       ============================================= */
    @media (max-width: 700px) {
      header { padding: 0 16px; }
      main { padding: 20px 12px 48px; }
      .action-bar { flex-direction: column; align-items: flex-start; }
      .status-info { margin-left: 0; }
      #accounts-container { grid-template-columns: 1fr; }
      .header-inner { height: auto; padding: 12px 0; flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<!-- ================================================
     HEADER
     ================================================ -->
<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">⚔</div>
      <span class="logo-text">Task Tracker</span>
    </div>
    <div class="header-controls">
      <div class="input-row">
        <input type="text" id="new-account-input" placeholder="Új fiók neve…" maxlength="40" />
        <button class="btn btn-purple" onclick="addAccount()">+ Fiók</button>
      </div>
    </div>
  </div>
</header>

<!-- ================================================
     MAIN
     ================================================ -->
<main>

  <!-- ACTION BAR -->
  <div class="action-bar">
    <span class="action-bar-title">⚡ Reset műveletek</span>
    <div class="action-bar-sep"></div>
    <div class="reset-section">
      <button class="btn btn-purple" onclick="confirmReset('daily')">
        🌅 Napi Reset
      </button>
      <button class="btn btn-gold" onclick="confirmReset('weekly')">
        📅 Heti Reset
      </button>
    </div>
    <div class="status-info">
      <div class="reset-timestamps" id="reset-timestamps">
        <span>Napi reset: —</span>
        <span>Heti reset: —</span>
      </div>
      <div class="chip chip-purple" id="chip-accounts">
        <span class="chip-dot"></span>
        <span id="chip-accounts-text">0 fiók</span>
      </div>
      <div class="chip chip-green" id="chip-chars">
        <span class="chip-dot"></span>
        <span id="chip-chars-text">0 karakter</span>
      </div>
    </div>
  </div>

  <!-- ACCOUNTS GRID -->
  <div id="accounts-container"></div>

  <!-- EMPTY STATE (shown when no accounts) -->
  <div id="empty-state" class="empty-state" style="display:none;">
    <div class="empty-state-icon">🏰</div>
    <div class="empty-state-text">Még nincs fiók — hozz létre egyet fent!</div>
  </div>

</main>

<!-- TOAST -->
<div id="toast"></div>

<!-- ================================================
     JAVASCRIPT
     ================================================ -->
<script>
  // ============================================================
  //  DATA MODEL
  //  Struktúra a localStorage-ban:
  //  {
  //    accounts: [
  //      {
  //        id: "acc_xxx",
  //        name: "Account 1",
  //        chars: [
  //          {
  //            id: "chr_xxx",
  //            name: "Karakter neve",
  //            tasks: {
  //              latokParbaja: false,  // napi
  //              szilizes: false,      // napi
  //              weeklyLatok: false,   // heti
  //              weeklySzilizes: false // heti
  //            }
  //          }
  //        ]
  //      }
  //    ],
  //    lastDailyReset: null,   // ISO string
  //    lastWeeklyReset: null   // ISO string
  //  }
  // ============================================================

  const STORAGE_KEY = 'gtt_data_v2';

  // ---------- State ----------
  let state = loadState();

  // ---------- Load / Save ----------
  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch(e) { /* ignore */ }
    return { accounts: [], lastDailyReset: null, lastWeeklyReset: null };
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  // ---------- ID Generator ----------
  function uid(prefix) {
    return prefix + '_' + Math.random().toString(36).slice(2, 9);
  }

  // ============================================================
  //  ACCOUNT CRUD
  // ============================================================

  function addAccount() {
    const input = document.getElementById('new-account-input');
    const name = input.value.trim();
    if (!name) { showToast('❗ Kérlek, adj meg egy fiók nevet!'); return; }

    const account = {
      id: uid('acc'),
      name,
      chars: []
    };
    state.accounts.push(account);
    saveState();
    input.value = '';
    renderAccount(account);
    updateStats();
    showToast(`✅ "${name}" fiók létrehozva`);
  }

  function deleteAccount(accountId) {
    const acc = state.accounts.find(a => a.id === accountId);
    if (!acc) return;
    showConfirm(
      `Törlöd a "${acc.name}" fiókot?`,
      `Ez a ${acc.chars.length} karaktert és az összes feladatot is eltávolítja. Ez nem vonható vissza.`,
      () => {
        state.accounts = state.accounts.filter(a => a.id !== accountId);
        saveState();
        const el = document.getElementById('card-' + accountId);
        if (el) el.remove();
        updateStats();
        checkEmpty();
        showToast(`🗑 "${acc.name}" törölve`);
      }
    );
  }

  function startRenameAccount(accountId) {
    const acc = state.accounts.find(a => a.id === accountId);
    if (!acc) return;
    const nameEl = document.getElementById('acc-name-' + accountId);
    const oldName = acc.name;

    // Replace text with input
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'account-name-input';
    inp.value = oldName;
    nameEl.replaceWith(inp);
    inp.focus();
    inp.select();

    const finish = () => {
      const newName = inp.value.trim() || oldName;
      acc.name = newName;
      saveState();
      // Restore text
      const span = document.createElement('span');
      span.className = 'account-name';
      span.id = 'acc-name-' + accountId;
      span.textContent = newName;
      inp.replaceWith(span);
      span.ondblclick = () => startRenameAccount(accountId);
      // Update badge
      const badge = document.getElementById('acc-badge-' + accountId);
      if (badge) badge.textContent = newName.charAt(0).toUpperCase();
      showToast(`✏️ Átnevezve: "${newName}"`);
    };

    inp.onblur = finish;
    inp.onkeydown = (e) => { if (e.key === 'Enter') inp.blur(); if (e.key === 'Escape') { inp.value = oldName; inp.blur(); } };
  }

  // ============================================================
  //  CHARACTER CRUD
  // ============================================================

  function addCharacter(accountId) {
    const inputEl = document.getElementById('char-input-' + accountId);
    const name = inputEl.value.trim();
    if (!name) { showToast('❗ Kérlek, adj meg egy karakter nevet!'); return; }

    const acc = state.accounts.find(a => a.id === accountId);
    if (!acc) return;

    const char = {
      id: uid('chr'),
      name,
      tasks: {
        latokParbaja: false,
        szilizes: false,
        weeklyLatok: false,
        weeklySzilizes: false
      }
    };
    acc.chars.push(char);
    saveState();
    inputEl.value = '';

    // Re-render just this account card's table
    renderCharTable(accountId);
    updateStats();
    showToast(`⚔ "${name}" karakter hozzáadva`);
  }

  function deleteCharacter(accountId, charId) {
    const acc = state.accounts.find(a => a.id === accountId);
    if (!acc) return;
    const ch = acc.chars.find(c => c.id === charId);
    if (!ch) return;
    showConfirm(
      `Törlöd "${ch.name}" karaktert?`,
      'A karakter összes feladatadata elvész.',
      () => {
        acc.chars = acc.chars.filter(c => c.id !== charId);
        saveState();
        renderCharTable(accountId);
        updateStats();
        showToast(`🗑 "${ch.name}" törölve`);
      }
    );
  }

  // ============================================================
  //  TASK TOGGLE
  // ============================================================

  function toggleTask(accountId, charId, taskKey, checked) {
    const acc = state.accounts.find(a => a.id === accountId);
    if (!acc) return;
    const ch = acc.chars.find(c => c.id === charId);
    if (!ch) return;
    ch.tasks[taskKey] = checked;
    saveState();
  }

  // ============================================================
  //  RESET LOGIC
  // ============================================================

  function confirmReset(type) {
    const isDaily = type === 'daily';
    showConfirm(
      isDaily ? '🌅 Napi Reset' : '📅 Heti Reset',
      isDaily
        ? 'Ez eltávolítja az összes napi feladat pipáját (Látók Párbaja, Szilizés). A fiókok és karakterek megmaradnak.'
        : 'Ez eltávolítja az összes heti feladat pipáját (Heti Látók Párbaja, Heti Szilizés). A fiókok és karakterek megmaradnak.',
      () => {
        performReset(type);
        const now = new Date().toISOString();
        if (isDaily) {
          state.lastDailyReset = now;
          showToast('🌅 Napi reset végrehajtva!');
        } else {
          state.lastWeeklyReset = now;
          showToast('📅 Heti reset végrehajtva!');
        }
        saveState();
        updateResetTimestamps();
        // Re-render all checkboxes
        state.accounts.forEach(acc => renderCharTable(acc.id));
      }
    );
  }

  function performReset(type) {
    const dailyKeys  = ['latokParbaja', 'szilizes'];
    const weeklyKeys = ['weeklyLatok', 'weeklySzilizes'];
    const keys = type === 'daily' ? dailyKeys : weeklyKeys;

    state.accounts.forEach(acc => {
      acc.chars.forEach(ch => {
        keys.forEach(k => { ch.tasks[k] = false; });
      });
    });
  }

  // ============================================================
  //  RENDER FUNCTIONS
  // ============================================================

  function renderAll() {
    const container = document.getElementById('accounts-container');
    container.innerHTML = '';
    state.accounts.forEach(acc => renderAccount(acc));
    updateStats();
    updateResetTimestamps();
    checkEmpty();
  }

  function renderAccount(acc) {
    const container = document.getElementById('accounts-container');
    checkEmpty(); // hide empty state

    const card = document.createElement('div');
    card.className = 'account-card';
    card.id = 'card-' + acc.id;

    card.innerHTML = `
      <div class="account-header">
        <div class="account-name-wrap">
          <div class="account-badge" id="acc-badge-${acc.id}">${acc.name.charAt(0).toUpperCase()}</div>
          <span class="account-name" id="acc-name-${acc.id}" title="Duplaklikk az átnevezéshez">${escHtml(acc.name)}</span>
        </div>
        <div class="account-actions">
          <button class="btn btn-ghost btn-sm" onclick="startRenameAccount('${acc.id}')" title="Átnevezés">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="deleteAccount('${acc.id}')" title="Törlés">🗑</button>
        </div>
      </div>
      <div class="char-table-wrap" id="char-wrap-${acc.id}"></div>
      <div class="add-char-row">
        <input type="text" id="char-input-${acc.id}" placeholder="Karakter neve…" maxlength="40"
               onkeydown="if(event.key==='Enter') addCharacter('${acc.id}')"/>
        <button class="btn btn-purple btn-sm" onclick="addCharacter('${acc.id}')">+ Karakter</button>
      </div>
    `;

    container.appendChild(card);

    // Allow rename on double-click of name
    document.getElementById('acc-name-' + acc.id).ondblclick = () => startRenameAccount(acc.id);

    // Render table
    renderCharTable(acc.id);
  }

  function renderCharTable(accountId) {
    const acc = state.accounts.find(a => a.id === accountId);
    const wrap = document.getElementById('char-wrap-' + accountId);
    if (!acc || !wrap) return;

    if (acc.chars.length === 0) {
      wrap.innerHTML = `
        <div style="padding:12px 8px 4px; text-align:center; color:var(--text-dim); font-family:var(--font-mono); font-size:11px;">
          — Még nincs karakter ebben a fiókban —
        </div>`;
      return;
    }

    // Build rows
    const rows = acc.chars.map(ch => {
      const t = ch.tasks;
      return `
        <tr>
          <td>
            <div class="char-name-cell">
              <div class="char-dot"></div>
              <span class="char-name">${escHtml(ch.name)}</span>
            </div>
          </td>
          <td class="task-col">
            <label class="cb-wrap cb-daily" title="Látók Párbaja (napi)">
              <input type="checkbox" ${t.latokParbaja ? 'checked' : ''}
                     onchange="toggleTask('${acc.id}','${ch.id}','latokParbaja',this.checked)"/>
              <span class="cb-box"></span>
            </label>
          </td>
          <td class="task-col">
            <label class="cb-wrap cb-daily" title="Szilizés (napi)">
              <input type="checkbox" ${t.szilizes ? 'checked' : ''}
                     onchange="toggleTask('${acc.id}','${ch.id}','szilizes',this.checked)"/>
              <span class="cb-box"></span>
            </label>
          </td>
          <td class="task-col">
            <label class="cb-wrap cb-weekly" title="Látók Párbaja (heti)">
              <input type="checkbox" ${t.weeklyLatok ? 'checked' : ''}
                     onchange="toggleTask('${acc.id}','${ch.id}','weeklyLatok',this.checked)"/>
              <span class="cb-box"></span>
            </label>
          </td>
          <td class="task-col">
            <label class="cb-wrap cb-weekly" title="Szilizés (heti)">
              <input type="checkbox" ${t.weeklySzilizes ? 'checked' : ''}
                     onchange="toggleTask('${acc.id}','${ch.id}','weeklySzilizes',this.checked)"/>
              <span class="cb-box"></span>
            </label>
          </td>
          <td style="text-align:right; padding-right:4px;">
            <button class="btn btn-danger" style="padding:3px 8px;font-size:11px;"
                    onclick="deleteCharacter('${acc.id}','${ch.id}')" title="Karakter törlése">✕</button>
          </td>
        </tr>`;
    }).join('');

    wrap.innerHTML = `
      <table class="char-table">
        <thead>
          <tr>
            <th>Karakter</th>
            <th class="task-col"><span class="col-label-daily">Látók Párbaja</span><br><small style="font-size:9px;opacity:.6">napi</small></th>
            <th class="task-col"><span class="col-label-daily">Szilizés</span><br><small style="font-size:9px;opacity:.6">napi</small></th>
            <th class="task-col"><span class="col-label-weekly">Látók Párbaja</span><br><small style="font-size:9px;opacity:.6">heti</small></th>
            <th class="task-col"><span class="col-label-weekly">Szilizés</span><br><small style="font-size:9px;opacity:.6">heti</small></th>
            <th></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // ============================================================
  //  STATS & UI HELPERS
  // ============================================================

  function updateStats() {
    const totalAccounts = state.accounts.length;
    const totalChars = state.accounts.reduce((s, a) => s + a.chars.length, 0);
    document.getElementById('chip-accounts-text').textContent = totalAccounts + (totalAccounts === 1 ? ' fiók' : ' fiók');
    document.getElementById('chip-chars-text').textContent = totalChars + (totalChars === 1 ? ' karakter' : ' karakter');
  }

  function updateResetTimestamps() {
    const el = document.getElementById('reset-timestamps');
    el.innerHTML = `
      <span>Napi reset: ${formatDate(state.lastDailyReset)}</span>
      <span>Heti reset: ${formatDate(state.lastWeeklyReset)}</span>
    `;
  }

  function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('hu-HU', { month:'short', day:'numeric' })
      + ' ' + d.toLocaleTimeString('hu-HU', { hour:'2-digit', minute:'2-digit' });
  }

  function checkEmpty() {
    const empty = document.getElementById('empty-state');
    if (state.accounts.length === 0) {
      empty.style.display = 'block';
    } else {
      empty.style.display = 'none';
    }
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ============================================================
  //  TOAST
  // ============================================================

  let toastTimer = null;

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.display = 'block';
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.style.display = 'none'; }, 2800);
  }

  // ============================================================
  //  CONFIRMATION MODAL
  // ============================================================

  function showConfirm(title, body, onConfirm) {
    // Remove existing modal
    const existing = document.getElementById('confirm-modal-overlay');
    if (existing) existing.remove();

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'confirm-modal-overlay';

    overlay.innerHTML = `
      <div class="modal">
        <div class="modal-title">${title}</div>
        <div class="modal-body">${body}</div>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="modal-cancel">Mégse</button>
          <button class="btn btn-danger" style="padding:8px 18px;font-size:13px;" id="modal-confirm">Megerősítés</button>
        </div>
      </div>`;

    document.body.appendChild(overlay);

    document.getElementById('modal-cancel').onclick = () => overlay.remove();
    document.getElementById('modal-confirm').onclick = () => {
      overlay.remove();
      onConfirm();
    };
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  }

  // ============================================================
  //  KEYBOARD SHORTCUT: Enter on account input
  // ============================================================
  document.getElementById('new-account-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addAccount();
  });

  // ============================================================
  //  INIT
  // ============================================================
  renderAll();
</script>
</body>
</html>
