<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Task Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg-base:        #0d0d12;
      --bg-card:        #13131c;
      --bg-card-hover:  #17172280;
      --bg-input:       #0a0a10;
      --bg-header:      #0f0f18;

      --border-dim:     #1e1e2e;
      --border-accent:  #5b21b6;
      --border-gold:    #b8860b;

      --purple-bright:  #a855f7;
      --purple-mid:     #7c3aed;
      --purple-dim:     #3b1f6e;
      --gold-bright:    #f5c842;
      --gold-mid:       #d4a017;
      --gold-dim:       #3a2a04;

      --text-primary:   #e8e8f0;
      --text-secondary: #8888aa;
      --text-dim:       #44445a;
      --text-gold:      #f5c842;
      --text-purple:    #c084fc;

      --green-bright:   #22c55e;
      --green-dim:      #052e16;
      --red-bright:     #f87171;
      --red-dim:        #3b0f0f;

      --radius-sm:      6px;
      --radius-md:      10px;
      --radius-lg:      16px;

      --shadow-purple:  0 0 20px #7c3aed33;
      --shadow-gold:    0 0 20px #d4a01733;
      --shadow-card:    0 4px 24px #00000060;

      --font-display:   'Rajdhani', sans-serif;
      --font-mono:      'Share Tech Mono', monospace;
      --font-body:      'Exo 2', sans-serif;

      --transition:     all 0.18s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg-base);
      background-image:
        radial-gradient(ellipse 80% 40% at 50% -10%, #1a0a3355 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 39px, #1a1a2208 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, #1a1a2208 40px);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: linear-gradient(180deg, #0c0c18 0%, var(--bg-header) 100%);
      border-bottom: 1px solid var(--border-accent);
      box-shadow: 0 2px 32px #7c3aed22, 0 0 0 1px #5b21b610;
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1600px;
      margin: 0 auto;
      height: 68px;
      gap: 24px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--purple-mid), var(--gold-mid));
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: var(--shadow-purple);
    }

    .logo-text {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--purple-bright), var(--gold-bright));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
      user-select: none;
    }

    .btn:active { transform: scale(0.97); }

    .btn-purple {
      background: linear-gradient(135deg, var(--purple-mid), #4c1d95);
      border-color: var(--purple-bright);
      color: #fff;
      box-shadow: 0 0 12px #7c3aed44;
    }
    .btn-purple:hover {
      background: linear-gradient(135deg, var(--purple-bright), var(--purple-mid));
      box-shadow: var(--shadow-purple);
    }

    .btn-gold {
      background: linear-gradient(135deg, var(--gold-mid), #78350f);
      border-color: var(--gold-bright);
      color: var(--gold-bright);
      box-shadow: 0 0 12px #d4a01733;
    }
    .btn-gold:hover {
      background: linear-gradient(135deg, var(--gold-bright), var(--gold-mid));
      color: #0d0d12;
      box-shadow: var(--shadow-gold);
    }

    .btn-danger {
      background: var(--red-dim);
      border-color: var(--red-bright);
      color: var(--red-bright);
      padding: 5px 10px;
      font-size: 12px;
    }
    .btn-danger:hover {
      background: #7f1d1d;
      box-shadow: 0 0 10px #f8717133;
    }

    .btn-ghost {
      background: transparent;
      border-color: var(--border-dim);
      color: var(--text-secondary);
      padding: 5px 12px;
      font-size: 12px;
    }
    .btn-ghost:hover {
      border-color: var(--purple-bright);
      color: var(--text-purple);
    }

    .btn-sm {
      padding: 5px 12px;
      font-size: 12px;
    }

    /* INPUTS */
    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    input[type="text"] {
      background: var(--bg-input);
      border: 1px solid var(--border-dim);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 14px;
      padding: 8px 14px;
      outline: none;
      transition: var(--transition);
      min-width: 0;
    }
    input[type="text"]::placeholder { color: var(--text-dim); }
    input[type="text"]:focus {
      border-color: var(--purple-bright);
      box-shadow: 0 0 0 2px #a855f722;
    }

    /* MAIN LAYOUT */
    main {
      max-width: 1600px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    /* ACTION BAR */
    .action-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 32px;
      padding: 16px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-card);
    }

    .action-bar-title {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .action-bar-sep {
      width: 1px;
      height: 28px;
      background: var(--border-dim);
    }

    .reset-section {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* STATUS CHIPS */
    .status-info {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-left: auto;
      flex-wrap: wrap;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-family: var(--font-mono);
      font-size: 11px;
      border: 1px solid;
    }
    .chip-purple { background: var(--purple-dim); border-color: var(--purple-mid); color: var(--text-purple); }
    .chip-gold   { background: var(--gold-dim);   border-color: var(--gold-mid);   color: var(--gold-bright); }
    .chip-green  { background: var(--green-dim);  border-color: var(--green-bright); color: var(--green-bright); }

    .chip-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ACCOUNTS GRID */
    #accounts-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(520px, 1fr));
      gap: 20px;
    }

    /* ACCOUNT CARD */
    .account-card {
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      animation: cardIn 0.25s ease both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .account-card:hover {
      border-color: var(--purple-dim);
      box-shadow: var(--shadow-card), 0 0 0 1px #5b21b620;
    }

    .account-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 12px;
      background: linear-gradient(90deg, #17172888, #12121c);
      border-bottom: 1px solid var(--border-dim);
      gap: 10px;
    }

    .account-name-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .account-badge {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--purple-dim), #0d0d12);
      border: 1px solid var(--purple-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-purple);
      flex-shrink: 0;
    }

    .account-name {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .account-name-input {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      background: #0a0a1888;
      border: 1px solid var(--purple-bright);
      border-radius: 4px;
      color: var(--text-primary);
      padding: 2px 8px;
      outline: none;
      width: 160px;
    }

    .account-actions { display: flex; gap: 6px; }

    /* CHARACTER TABLE */
    .char-table-wrap {
      padding: 14px 18px;
    }

    table.char-table {
      width: 100%;
      border-collapse: collapse;
    }

    .char-table thead tr {
      border-bottom: 1px solid var(--border-dim);
    }

    .char-table th {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-secondary);
      padding: 4px 8px 8px;
      text-align: left;
    }

    /* Day header cells */
    .char-table th.day-col {
      text-align: center;
      min-width: 44px;
      padding: 4px 3px 8px;
    }

    .day-col-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .day-col-name {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .day-col-date {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-dim);
      font-weight: 400;
    }

    /* Today highlight */
    .day-col.today .day-col-name { color: var(--gold-bright); }
    .day-col.today .day-col-date { color: var(--gold-mid); }
    .day-col.today-border {
      position: relative;
    }
    .day-col.today-border::after {
      content: '';
      position: absolute;
      bottom: 0; left: 3px; right: 3px;
      height: 2px;
      background: var(--gold-bright);
      border-radius: 1px;
    }

    /* Past day dimmed */
    .day-col.past .day-col-name { color: var(--text-dim); opacity: 0.5; }
    .day-col.past .day-col-date { color: var(--text-dim); opacity: 0.4; }

    .char-table tbody tr {
      border-bottom: 1px solid #1a1a2a;
      transition: background 0.15s ease;
    }
    .char-table tbody tr:last-child { border-bottom: none; }
    .char-table tbody tr:hover { background: var(--bg-card-hover); }

    .char-table td {
      padding: 6px 8px;
      vertical-align: middle;
    }

    /* Character name cell — two label rows */
    .char-name-cell {
      display: flex;
      flex-direction: column;
      gap: 0px;
      min-width: 110px;
    }

    .char-name-top {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .char-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--purple-mid);
      flex-shrink: 0;
    }

    .char-name {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* Task label rows inside the name cell */
    .char-task-labels {
      display: flex;
      flex-direction: column;
      gap: 1px;
      padding-left: 14px;
      margin-top: 4px;
    }

    .task-label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .task-label-latok {
      color: var(--gold-mid);
    }

    .task-label-szilank {
      color: var(--text-purple);
    }

    .task-label-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .task-label-dot-gold   { background: var(--gold-mid); }
    .task-label-dot-purple { background: var(--purple-mid); }

    /* Day cells — stacked double checkbox */
    .char-table td.day-cell {
      text-align: center;
      padding: 5px 3px;
      vertical-align: middle;
    }

    .day-cell-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    /* CUSTOM CHECKBOXES */
    .cb-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .cb-wrap input[type="checkbox"] { display: none; }

    .cb-box {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 1.5px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      position: relative;
      flex-shrink: 0;
    }

    /* Weekly day checkbox — gold theme (Látók Párbaja) */
    .cb-day .cb-box {
      width: 20px;
      height: 20px;
      border-color: var(--gold-mid);
      background: #3a2a0422;
      border-radius: 3px;
    }
    .cb-day input:checked ~ .cb-box {
      border-color: var(--gold-bright);
      background: var(--gold-dim);
      box-shadow: 0 0 6px #f5c84255;
    }
    .cb-day .cb-box::after {
      content: '';
      display: none;
      width: 4px;
      height: 9px;
      border: 2px solid var(--gold-bright);
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }
    .cb-day input:checked ~ .cb-box::after { display: block; }

    /* Weekly day checkbox — purple theme (Szilizés) */
    .cb-szilank .cb-box {
      width: 20px;
      height: 20px;
      border-color: var(--purple-mid);
      background: #1a0a3322;
      border-radius: 3px;
    }
    .cb-szilank input:checked ~ .cb-box {
      border-color: var(--purple-bright);
      background: var(--purple-dim);
      box-shadow: 0 0 6px #a855f755;
    }
    .cb-szilank .cb-box::after {
      content: '';
      display: none;
      width: 4px;
      height: 9px;
      border: 2px solid var(--purple-bright);
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }
    .cb-szilank input:checked ~ .cb-box::after { display: block; }

    /* Past day cell dimmed */
    .cb-day.past .cb-box,
    .cb-szilank.past .cb-box {
      border-color: #2a2a3a;
      background: #0d0d1a;
      opacity: 0.55;
    }
    .cb-day.past input:checked ~ .cb-box {
      border-color: #6b5a20;
      background: #2a1f04;
      box-shadow: none;
      opacity: 0.7;
    }
    .cb-szilank.past input:checked ~ .cb-box {
      border-color: #4a2a6a;
      background: #1a0a30;
      box-shadow: none;
      opacity: 0.7;
    }

    /* ADD CHARACTER ROW */
    .add-char-row {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px 18px 14px;
      border-top: 1px solid var(--border-dim);
    }

    .add-char-row input[type="text"] {
      flex: 1;
      font-size: 13px;
      padding: 6px 12px;
    }

    /* Week nav buttons */
    .wn-btn {
      background: transparent;
      border: 1px solid var(--gold-dim);
      border-radius: 3px;
      color: var(--gold-mid);
      cursor: pointer;
      font-size: 12px;
      padding: 2px 7px;
      transition: var(--transition);
      font-family: var(--font-mono);
    }
    .wn-btn:hover {
      border-color: var(--gold-bright);
      color: var(--gold-bright);
    }

    .wn-today-btn {
      background: #3a2a0444;
      border: 1px solid var(--gold-dim);
      border-radius: 3px;
      color: var(--gold-bright);
      cursor: pointer;
      font-size: 10px;
      padding: 2px 7px;
      transition: var(--transition);
      font-family: var(--font-display);
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .wn-today-btn:hover {
      background: var(--gold-dim);
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dim);
    }
    .empty-state-icon { font-size: 36px; margin-bottom: 12px; }
    .empty-state-text {
      font-family: var(--font-display);
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* CONFIRMATION MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: #00000088;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      animation: fadeIn 0.15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border-accent);
      border-radius: var(--radius-lg);
      padding: 28px 32px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 8px 48px #00000090, var(--shadow-purple);
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(-10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 10px;
      color: var(--text-primary);
    }

    .modal-body {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--bg-card);
      border: 1px solid var(--purple-bright);
      border-radius: var(--radius-md);
      padding: 12px 20px;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--text-purple);
      box-shadow: var(--shadow-purple);
      z-index: 9999;
      display: none;
      animation: toastIn 0.2s ease;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .reset-timestamps {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: var(--purple-dim); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--purple-mid); }

    @media (max-width: 700px) {
      header { padding: 0 16px; }
      main { padding: 20px 12px 48px; }
      .action-bar { flex-direction: column; align-items: flex-start; }
      .status-info { margin-left: 0; }
      #accounts-container { grid-template-columns: 1fr; }
      .header-inner { height: auto; padding: 12px 0; flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">⚔</div>
      <span class="logo-text">Task Tracker</span>
    </div>
    <div class="header-controls">
      <div class="input-row">
        <input type="text" id="new-account-input" placeholder="Új fiók neve…" maxlength="40" />
        <button class="btn btn-purple" onclick="addAccount()">+ Fiók</button>
      </div>
    </div>
  </div>
</header>

<main>

  <div class="action-bar">
    <span class="action-bar-title">⚡ Reset műveletek</span>
    <div class="action-bar-sep"></div>
    <div class="reset-section">
      <button class="btn btn-purple" onclick="confirmReset('daily')">
        🌅 Napi Reset
      </button>
      <button class="btn btn-gold" onclick="confirmReset('weekly')">
        📅 Heti Reset
      </button>
    </div>
    <div class="status-info">
      <div class="reset-timestamps" id="reset-timestamps">
        <span>Napi reset: —</span>
        <span>Heti reset: —</span>
      </div>
      <div class="chip chip-purple" id="chip-accounts">
        <span class="chip-dot"></span>
        <span id="chip-accounts-text">0 fiók</span>
      </div>
      <div class="chip chip-green" id="chip-chars">
        <span class="chip-dot"></span>
        <span id="chip-chars-text">0 karakter</span>
      </div>
    </div>
  </div>

  <div id="accounts-container"></div>

  <div id="empty-state" class="empty-state" style="display:none;">
    <div class="empty-state-icon">🏰</div>
    <div class="empty-state-text">Még nincs fiók — hozz létre egyet fent!</div>
  </div>

</main>

<div id="toast"></div>

<script>
  // ============================================================
  //  DATA MODEL
  //  {
  //    accounts: [
  //      {
  //        id: "acc_xxx",
  //        name: "Account 1",
  //        chars: [
  //          {
  //            id: "chr_xxx",
  //            name: "Karakter neve",
  //            tasks: {
  //              weeklyTasks: {
  //                "2025-W22": {
  //                  "Mon": { latok: false, szilank: false },
  //                  "Tue": { latok: false, szilank: false },
  //                  ...
  //                }
  //              }
  //            }
  //          }
  //        ]
  //      }
  //    ],
  //    lastDailyReset: null,
  //    lastWeeklyReset: null
  //  }
  // ============================================================

  const STORAGE_KEY = 'gtt_data_v4';

  // Per-account week offset (how many weeks forward/back from current)
  const accountWeekOffset = {};

  const DAY_KEYS  = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  const DAY_NAMES = ['H', 'K', 'Sz', 'Cs', 'P', 'Szo', 'V'];
  const DAY_FULL  = ['Hétfő', 'Kedd', 'Szerda', 'Csütörtök', 'Péntek', 'Szombat', 'Vasárnap'];

  // ---------- State ----------
  let state = loadState();

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        // Migrate old v3 data to v4
        (parsed.accounts || []).forEach(acc => {
          (acc.chars || []).forEach(ch => {
            if (!ch.tasks) ch.tasks = {};

            // If old boolean daily fields exist, remove them
            delete ch.tasks.latokParbaja;
            delete ch.tasks.szilizes;

            // Migrate old weeklyLatok (per-day boolean) -> weeklyTasks (per-day object)
            if (!ch.tasks.weeklyTasks) {
              ch.tasks.weeklyTasks = {};
              if (ch.tasks.weeklyLatok && typeof ch.tasks.weeklyLatok === 'object') {
                Object.entries(ch.tasks.weeklyLatok).forEach(([wk, days]) => {
                  ch.tasks.weeklyTasks[wk] = {};
                  DAY_KEYS.forEach(dk => {
                    ch.tasks.weeklyTasks[wk][dk] = {
                      latok: !!(days && days[dk]),
                      szilank: false
                    };
                  });
                });
              }
            }
            delete ch.tasks.weeklyLatok;
          });
        });
        return parsed;
      }
    } catch(e) { /* ignore */ }
    return { accounts: [], lastDailyReset: null, lastWeeklyReset: null };
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function uid(prefix) {
    return prefix + '_' + Math.random().toString(36).slice(2, 9);
  }

  // ============================================================
  //  WEEK UTILITIES
  // ============================================================

  function getMondayOfWeek(date) {
    const d = new Date(date);
    const day = d.getDay();
    const diff = (day === 0) ? -6 : 1 - day;
    d.setDate(d.getDate() + diff);
    d.setHours(0, 0, 0, 0);
    return d;
  }

  function getWeekKey(date) {
    const monday = getMondayOfWeek(date);
    const year = monday.getFullYear();
    const start = new Date(year, 0, 1);
    const weekNum = Math.ceil(((monday - start) / 86400000 + start.getDay() + 1) / 7);
    return year + '-W' + String(weekNum).padStart(2, '0');
  }

  function getWeekDates(offset) {
    const base = new Date();
    base.setDate(base.getDate() + offset * 7);
    const monday = getMondayOfWeek(base);
    return DAY_KEYS.map((_, i) => {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      return d;
    });
  }

  function fmtDate(date) {
    return (date.getMonth() + 1) + '.' + String(date.getDate()).padStart(2, '0');
  }

  function isToday(date) {
    const now = new Date();
    return date.getFullYear() === now.getFullYear() &&
           date.getMonth() === now.getMonth() &&
           date.getDate() === now.getDate();
  }

  function isPast(date) {
    const now = new Date();
    now.setHours(0,0,0,0);
    return date < now;
  }

  // Returns the DAY_KEY for today (e.g. "Mon")
  function todayDayKey() {
    const day = new Date().getDay(); // 0=Sun
    const map = [6, 0, 1, 2, 3, 4, 5]; // Sun->6, Mon->0 ... Sat->5
    return DAY_KEYS[map[day]];
  }

  // ============================================================
  //  HELPERS — ensure task slot exists
  // ============================================================
  function ensureTaskSlot(ch, weekKey, dayKey) {
    if (!ch.tasks.weeklyTasks) ch.tasks.weeklyTasks = {};
    if (!ch.tasks.weeklyTasks[weekKey]) ch.tasks.weeklyTasks[weekKey] = {};
    if (!ch.tasks.weeklyTasks[weekKey][dayKey]) {
      ch.tasks.weeklyTasks[weekKey][dayKey] = { latok: false, szilank: false };
    }
  }

  // ============================================================
  //  ACCOUNT CRUD
  // ============================================================

  function addAccount() {
    const input = document.getElementById('new-account-input');
    const name = input.value.trim();
    if (!name) { showToast('❗ Kérlek, adj meg egy fiók nevet!'); return; }

    const account = { id: uid('acc'), name, chars: [] };
    state.accounts.push(account);
    saveState();
    input.value = '';
    accountWeekOffset[account.id] = 0;
    renderAccount(account);
    updateStats();
    showToast(`✅ "${name}" fiók létrehozva`);
  }

  function deleteAccount(accountId) {
    const acc = state.accounts.find(a => a.id === accountId);
    if (!acc) return;
    showConfirm(
      `Törlöd a "${acc.name}" fiókot?`,
      `Ez a ${acc.chars.length} karaktert és az összes feladatot is eltávolítja. Ez nem vonható vissza.`,
      () => {
        state.accounts = state.accounts.filter(a => a.id !== accountId);
        saveState();
        const el = document.getElementById('card-' + accountId);
        if (el) el.remove();
        updateStats();
        checkEmpty();
        showToast(`🗑 "${acc.name}" törölve`);
      }
    );
  }

  function startRenameAccount(accountId) {
    const acc = state.accounts.find(a => a.id === accountId);
    if (!acc) return;
    const nameEl = document.getElementById('acc-name-' + accountId);
    const oldName = acc.name;

    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'account-name-input';
    inp.value = oldName;
    nameEl.replaceWith(inp);
    inp.focus();
    inp.select();

    const finish = () => {
      const newName = inp.value.trim() || oldName;
      acc.name = newName;
      saveState();
      const span = document.createElement('span');
      span.className = 'account-name';
      span.id = 'acc-name-' + accountId;
      span.textContent = newName;
      inp.replaceWith(span);
      span.ondblclick = () => startRenameAccount(accountId);
      const badge = document.getElementById('acc-badge-' + accountId);
      if (badge) badge.textContent = newName.charAt(0).toUpperCase();
      showToast(`✏️ Átnevezve: "${newName}"`);
    };

    inp.onblur = finish;
    inp.onkeydown = (e) => {
      if (e.key === 'Enter') inp.blur();
      if (e.key === 'Escape') { inp.value = oldName; inp.blur(); }
    };
  }

  // ============================================================
  //  CHARACTER CRUD
  // ============================================================

  function addCharacter(accountId) {
    const inputEl = document.getElementById('char-input-' + accountId);
    const name = inputEl.value.trim();
    if (!name) { showToast('❗ Kérlek, adj meg egy karakter nevet!'); return; }

    const acc = state.accounts.find(a => a.id === accountId);
    if (!acc) return;

    const char = {
      id: uid('chr'),
      name,
      tasks: { weeklyTasks: {} }
    };
    acc.chars.push(char);
    saveState();
    inputEl.value = '';
    renderCharTable(accountId);
    updateStats();
    showToast(`⚔ "${name}" karakter hozzáadva`);
  }

  function deleteCharacter(accountId, charId) {
    const acc = state.accounts.find(a => a.id === accountId);
    if (!acc) return;
    const ch = acc.chars.find(c => c.id === charId);
    if (!ch) return;
    showConfirm(
      `Törlöd "${ch.name}" karaktert?`,
      'A karakter összes feladatadata elvész.',
      () => {
        acc.chars = acc.chars.filter(c => c.id !== charId);
        saveState();
        renderCharTable(accountId);
        updateStats();
        showToast(`🗑 "${ch.name}" törölve`);
      }
    );
  }

  // ============================================================
  //  TASK TOGGLE
  // ============================================================

  function toggleWeeklyTask(accountId, charId, weekKey, dayKey, taskField, checked) {
    const acc = state.accounts.find(a => a.id === accountId);
    if (!acc) return;
    const ch = acc.chars.find(c => c.id === charId);
    if (!ch) return;
    ensureTaskSlot(ch, weekKey, dayKey);
    ch.tasks.weeklyTasks[weekKey][dayKey][taskField] = checked;
    saveState();
  }

  // ============================================================
  //  WEEK NAVIGATION
  // ============================================================

  function changeWeek(accountId, delta) {
    if (accountWeekOffset[accountId] === undefined) accountWeekOffset[accountId] = 0;
    accountWeekOffset[accountId] += delta;
    renderCharTable(accountId);
  }

  function goToCurrentWeek(accountId) {
    accountWeekOffset[accountId] = 0;
    renderCharTable(accountId);
  }

  // ============================================================
  //  RESET LOGIC
  // ============================================================

  function confirmReset(type) {
    const isDaily = type === 'daily';
    showConfirm(
      isDaily ? '🌅 Napi Reset' : '📅 Heti Reset',
      isDaily
        ? 'Ez eltávolítja a mai nap összes pipáját (Látók Párbaja és Szilizés) minden karakternél. A többi nap megmarad.'
        : 'Ez törli az aktuális hét összes napjának összes pipáját (Látók Párbaja és Szilizés). A többi hét megmarad.',
      () => {
        performReset(type);
        const now = new Date().toISOString();
        if (isDaily) {
          state.lastDailyReset = now;
          showToast('🌅 Napi reset végrehajtva!');
        } else {
          state.lastWeeklyReset = now;
          showToast('📅 Heti reset végrehajtva!');
        }
        saveState();
        updateResetTimestamps();
        state.accounts.forEach(acc => renderCharTable(acc.id));
      }
    );
  }

  function performReset(type) {
    if (type === 'daily') {
      // Clear only today's data
      const currentWeekKey = getWeekKey(new Date());
      const todayKey = todayDayKey();
      state.accounts.forEach(acc => {
        acc.chars.forEach(ch => {
          if (ch.tasks.weeklyTasks &&
              ch.tasks.weeklyTasks[currentWeekKey] &&
              ch.tasks.weeklyTasks[currentWeekKey][todayKey]) {
            ch.tasks.weeklyTasks[currentWeekKey][todayKey] = { latok: false, szilank: false };
          }
        });
      });
    } else {
      // Weekly reset: clear the entire current week
      const currentWeekKey = getWeekKey(new Date());
      state.accounts.forEach(acc => {
        acc.chars.forEach(ch => {
          if (ch.tasks.weeklyTasks && ch.tasks.weeklyTasks[currentWeekKey]) {
            delete ch.tasks.weeklyTasks[currentWeekKey];
          }
        });
      });
    }
  }

  // ============================================================
  //  RENDER
  // ============================================================

  function renderAll() {
    const container = document.getElementById('accounts-container');
    container.innerHTML = '';
    state.accounts.forEach(acc => {
      accountWeekOffset[acc.id] = 0;
      renderAccount(acc);
    });
    updateStats();
    updateResetTimestamps();
    checkEmpty();
  }

  function renderAccount(acc) {
    const container = document.getElementById('accounts-container');
    checkEmpty();

    const card = document.createElement('div');
    card.className = 'account-card';
    card.id = 'card-' + acc.id;

    card.innerHTML = `
      <div class="account-header">
        <div class="account-name-wrap">
          <div class="account-badge" id="acc-badge-${acc.id}">${acc.name.charAt(0).toUpperCase()}</div>
          <span class="account-name" id="acc-name-${acc.id}" title="Duplaklikk az átnevezéshez">${escHtml(acc.name)}</span>
        </div>
        <div class="account-actions">
          <button class="btn btn-ghost btn-sm" onclick="startRenameAccount('${acc.id}')" title="Átnevezés">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="deleteAccount('${acc.id}')" title="Törlés">🗑</button>
        </div>
      </div>
      <div class="char-table-wrap" id="char-wrap-${acc.id}"></div>
      <div class="add-char-row">
        <input type="text" id="char-input-${acc.id}" placeholder="Karakter neve…" maxlength="40"
               onkeydown="if(event.key==='Enter') addCharacter('${acc.id}')"/>
        <button class="btn btn-purple btn-sm" onclick="addCharacter('${acc.id}')">+ Karakter</button>
      </div>
    `;

    container.appendChild(card);
    document.getElementById('acc-name-' + acc.id).ondblclick = () => startRenameAccount(acc.id);
    renderCharTable(acc.id);
  }

  function renderCharTable(accountId) {
    const acc = state.accounts.find(a => a.id === accountId);
    const wrap = document.getElementById('char-wrap-' + accountId);
    if (!acc || !wrap) return;

    const offset = accountWeekOffset[accountId] || 0;
    const weekDates = getWeekDates(offset);
    const weekKey = getWeekKey(weekDates[0]);
    const weekRange = fmtDate(weekDates[0]) + ' – ' + fmtDate(weekDates[6]);
    const isCurrentWeek = (offset === 0);

    if (acc.chars.length === 0) {
      wrap.innerHTML = `
        <div style="padding:12px 8px 4px; text-align:center; color:var(--text-dim); font-family:var(--font-mono); font-size:11px;">
          — Még nincs karakter ebben a fiókban —
        </div>`;
      return;
    }

    // Build day header cells
    const dayHeaders = weekDates.map((d, i) => {
      const todayClass = isToday(d) ? ' today today-border' : (isPast(d) ? ' past' : '');
      return `<th class="day-col${todayClass}">
        <div class="day-col-inner">
          <span class="day-col-name">${DAY_NAMES[i]}</span>
          <span class="day-col-date">${fmtDate(d)}</span>
        </div>
      </th>`;
    }).join('');

    // Build character rows — each row has stacked dual checkboxes per day
    const rows = acc.chars.map(ch => {
      const weeklyData = (ch.tasks.weeklyTasks && ch.tasks.weeklyTasks[weekKey]) || {};

      const dayCells = weekDates.map((d, i) => {
        const dayKey = DAY_KEYS[i];
        const dayData = weeklyData[dayKey] || { latok: false, szilank: false };
        const pastClass = isPast(d) && !isToday(d) ? ' past' : '';
        const latokChecked = dayData.latok ? 'checked' : '';
        const szilankChecked = dayData.szilank ? 'checked' : '';

        return `<td class="day-cell">
          <div class="day-cell-stack">
            <label class="cb-wrap cb-day${pastClass}" title="${DAY_FULL[i]} – Látók Párbaja">
              <input type="checkbox" ${latokChecked}
                     onchange="toggleWeeklyTask('${acc.id}','${ch.id}','${weekKey}','${dayKey}','latok',this.checked)"/>
              <span class="cb-box"></span>
            </label>
            <label class="cb-wrap cb-szilank${pastClass}" title="${DAY_FULL[i]} – Szilizés">
              <input type="checkbox" ${szilankChecked}
                     onchange="toggleWeeklyTask('${acc.id}','${ch.id}','${weekKey}','${dayKey}','szilank',this.checked)"/>
              <span class="cb-box"></span>
            </label>
          </div>
        </td>`;
      }).join('');

      return `
        <tr>
          <td>
            <div class="char-name-cell">
              <div class="char-name-top">
                <div class="char-dot"></div>
                <span class="char-name">${escHtml(ch.name)}</span>
              </div>
              <div class="char-task-labels">
                <span class="task-label task-label-latok">
                  <span class="task-label-dot task-label-dot-gold"></span>Látók
                </span>
                <span class="task-label task-label-szilank">
                  <span class="task-label-dot task-label-dot-purple"></span>Szilizés
                </span>
              </div>
            </div>
          </td>
          ${dayCells}
          <td style="text-align:right; padding-right:4px; vertical-align:middle;">
            <button class="btn btn-danger" style="padding:3px 8px;font-size:11px;"
                    onclick="deleteCharacter('${acc.id}','${ch.id}')" title="Karakter törlése">✕</button>
          </td>
        </tr>`;
    }).join('');

    const todayBtnHtml = !isCurrentWeek
      ? `<button class="wn-today-btn" onclick="goToCurrentWeek('${accountId}')">Ma</button>`
      : '';

    const weekLabel = isCurrentWeek
      ? `Aktuális hét · ${weekRange}`
      : (offset > 0 ? `+${offset} hét · ${weekRange}` : `${offset} hét · ${weekRange}`);

    wrap.innerHTML = `
      <table class="char-table">
        <thead>
          <tr>
            <th style="min-width:130px;">Karakter</th>
            <th colspan="7" style="text-align:center; padding-bottom:2px;">
              <div style="display:flex;align-items:center;justify-content:center;gap:6px;padding-bottom:4px;">
                <button class="wn-btn" onclick="changeWeek('${accountId}', -1)" title="Előző hét">◀</button>
                <span style="font-family:var(--font-mono);font-size:10px;color:var(--gold-bright);">🗓 Heti feladatok</span>
                <span style="font-family:var(--font-mono);font-size:9px;color:var(--text-dim);">${weekLabel}</span>
                ${todayBtnHtml}
                <button class="wn-btn" onclick="changeWeek('${accountId}', 1)" title="Következő hét">▶</button>
              </div>
              <div style="display:flex;align-items:center;justify-content:center;gap:16px;padding-top:2px;padding-bottom:2px;">
                <span style="display:flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:9px;color:var(--gold-mid);">
                  <span style="width:8px;height:8px;border-radius:2px;background:var(--gold-dim);border:1px solid var(--gold-mid);display:inline-block;"></span>
                  Látók Párbaja
                </span>
                <span style="display:flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:9px;color:var(--text-purple);">
                  <span style="width:8px;height:8px;border-radius:2px;background:var(--purple-dim);border:1px solid var(--purple-mid);display:inline-block;"></span>
                  Szilizés
                </span>
              </div>
            </th>
            <th></th>
          </tr>
          <tr>
            <th></th>
            ${dayHeaders}
            <th></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // ============================================================
  //  STATS & HELPERS
  // ============================================================

  function updateStats() {
    const totalAccounts = state.accounts.length;
    const totalChars = state.accounts.reduce((s, a) => s + a.chars.length, 0);
    document.getElementById('chip-accounts-text').textContent = totalAccounts + ' fiók';
    document.getElementById('chip-chars-text').textContent = totalChars + ' karakter';
  }

  function updateResetTimestamps() {
    const el = document.getElementById('reset-timestamps');
    el.innerHTML = `
      <span>Napi reset: ${formatDate(state.lastDailyReset)}</span>
      <span>Heti reset: ${formatDate(state.lastWeeklyReset)}</span>
    `;
  }

  function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('hu-HU', { month:'short', day:'numeric' })
      + ' ' + d.toLocaleTimeString('hu-HU', { hour:'2-digit', minute:'2-digit' });
  }

  function checkEmpty() {
    const empty = document.getElementById('empty-state');
    empty.style.display = state.accounts.length === 0 ? 'block' : 'none';
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ============================================================
  //  TOAST
  // ============================================================

  let toastTimer = null;

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.display = 'block';
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.style.display = 'none'; }, 2800);
  }

  // ============================================================
  //  CONFIRM MODAL
  // ============================================================

  function showConfirm(title, body, onConfirm) {
    const existing = document.getElementById('confirm-modal-overlay');
    if (existing) existing.remove();

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'confirm-modal-overlay';

    overlay.innerHTML = `
      <div class="modal">
        <div class="modal-title">${title}</div>
        <div class="modal-body">${body}</div>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="modal-cancel">Mégse</button>
          <button class="btn btn-danger" style="padding:8px 18px;font-size:13px;" id="modal-confirm">Megerősítés</button>
        </div>
      </div>`;

    document.body.appendChild(overlay);

    document.getElementById('modal-cancel').onclick = () => overlay.remove();
    document.getElementById('modal-confirm').onclick = () => { overlay.remove(); onConfirm(); };
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  }

  // ============================================================
  //  KEYBOARD
  // ============================================================
  document.getElementById('new-account-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addAccount();
  });

  // ============================================================
  //  INIT
  // ============================================================
  renderAll();
</script>
</body>
</html>
